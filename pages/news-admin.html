<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기사 관리 | RegenMed Consulting</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #f0f4f8; min-height: 100vh; }

        /* ── 로그인 ── */
        #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box {
            background: #fff; border-radius: 16px; padding: 48px 40px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.12); width: 100%; max-width: 380px; text-align: center;
        }
        .login-logo { font-size: 2.2rem; margin-bottom: 8px; }
        .login-title { font-size: 1.2rem; font-weight: 700; color: #0D1B3E; margin-bottom: 4px; }
        .login-sub { font-size: 0.85rem; color: #888; margin-bottom: 32px; }
        .login-box input[type="password"] {
            width: 100%; padding: 14px 16px; border: 2px solid #e0e6ef;
            border-radius: 10px; font-size: 1.2rem; text-align: center;
            letter-spacing: 0.3em; outline: none; transition: border-color 0.2s;
            font-family: inherit; margin-bottom: 16px;
        }
        .login-box input[type="password"]:focus { border-color: #1a73e8; }
        .btn-login {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #0D1B3E, #1a73e8);
            color: #fff; border: none; border-radius: 10px; font-size: 1rem;
            font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.9; }
        .login-error { color: #e53935; font-size: 0.85rem; margin-top: 10px; display: none; }

        /* ── 관리자 패널 ── */
        #adminPanel { display: none; }
        .admin-header {
            background: linear-gradient(135deg, #0D1B3E 0%, #1a73e8 100%);
            color: #fff; padding: 20px 32px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .admin-header h1 { font-size: 1.1rem; font-weight: 700; }
        .admin-header span { font-size: 0.85rem; opacity: 0.8; }
        .btn-logout {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer;
            font-family: inherit; font-size: 0.85rem;
        }
        .admin-body { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

        /* ── 폼 ── */
        .add-form {
            background: #fff; border-radius: 14px; padding: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 32px;
        }
        .add-form h2 { font-size: 1rem; font-weight: 700; color: #0D1B3E; margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .form-row.full { grid-template-columns: 1fr; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.8rem; font-weight: 600; color: #555; }
        .form-group input {
            padding: 10px 14px; border: 1.5px solid #e0e6ef; border-radius: 8px;
            font-size: 0.9rem; outline: none; transition: border-color 0.2s; font-family: inherit;
        }
        .form-group input:focus { border-color: #1a73e8; }
        .form-group input::placeholder { color: #bbb; }
        .btn-add {
            width: 100%; padding: 13px; background: linear-gradient(135deg, #0D1B3E, #1a73e8);
            color: #fff; border: none; border-radius: 10px; font-size: 0.95rem;
            font-weight: 600; cursor: pointer; font-family: inherit;
            margin-top: 8px; transition: opacity 0.2s;
        }
        .btn-add:hover { opacity: 0.9; }
        .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── 목록 ── */
        .article-list { background: #fff; border-radius: 14px; padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
        .article-list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .article-list h2 { font-size: 1rem; font-weight: 700; color: #0D1B3E; }
        .article-count { font-size: 0.82rem; color: #888; font-weight: 400; margin-left: 8px; }
        .empty-msg { text-align: center; color: #bbb; font-size: 0.9rem; padding: 40px 0; }
        .loading-msg { text-align: center; color: #1a73e8; font-size: 0.9rem; padding: 40px 0; }
        .article-item {
            display: flex; align-items: flex-start; gap: 14px;
            padding: 16px 0; border-bottom: 1px solid #f0f0f0;
        }
        .article-item:last-child { border-bottom: none; padding-bottom: 0; }
        .article-num {
            min-width: 28px; height: 28px; background: #f0f4f8; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.78rem; font-weight: 700; color: #555; flex-shrink: 0;
        }
        .article-info { flex: 1; min-width: 0; }
        .article-info .tag {
            display: inline-block; background: #e8f0fe; color: #1a73e8;
            font-size: 0.72rem; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-bottom: 5px;
        }
        .article-info .title {
            font-size: 0.9rem; font-weight: 600; color: #222;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
        }
        .article-info .meta { font-size: 0.78rem; color: #888; }
        .article-info .meta a { color: #1a73e8; text-decoration: none; }
        .btn-delete {
            background: none; border: 1px solid #fcc; color: #e53935;
            padding: 5px 12px; border-radius: 7px; cursor: pointer;
            font-size: 0.78rem; font-family: inherit; flex-shrink: 0; transition: background 0.2s;
        }
        .btn-delete:hover { background: #fee; }
        .toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            background: #0D1B3E; color: #fff; padding: 12px 24px; border-radius: 10px;
            font-size: 0.9rem; font-weight: 500; opacity: 0; transition: opacity 0.3s;
            pointer-events: none; z-index: 999;
        }
        .toast.show { opacity: 1; }
        .preview-link { display: inline-block; margin-top: 20px; color: #1a73e8; font-size: 0.85rem; text-decoration: none; }
        .preview-link:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .admin-header { padding: 16px 20px; flex-wrap: wrap; gap: 10px; }
            .admin-body { padding: 20px 16px; }
        }
    </style>
</head>
<body>

<!-- 로그인 -->
<div id="loginScreen">
    <div class="login-box">
        <div class="login-logo">🧬</div>
        <div class="login-title">기사 관리자 페이지</div>
        <div class="login-sub">RegenMed Consulting</div>
        <input type="password" id="pwInput" placeholder="비밀번호 입력" maxlength="10"
               onkeydown="if(event.key==='Enter') login()">
        <button class="btn-login" onclick="login()">로그인</button>
        <div class="login-error" id="loginError">비밀번호가 올바르지 않습니다.</div>
    </div>
</div>

<!-- 관리자 패널 -->
<div id="adminPanel">
    <div class="admin-header">
        <div>
            <h1>🧬 기사 관리 대시보드</h1>
            <span>RegenMed Consulting · Supabase 연동</span>
        </div>
        <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>

    <div class="admin-body">
        <!-- 추가 폼 -->
        <div class="add-form">
            <h2>+ 새 기사 추가</h2>
            <div class="form-row full">
                <div class="form-group">
                    <label>기사 제목 *</label>
                    <input type="text" id="f-title" placeholder="기사 제목을 입력하세요">
                </div>
            </div>
            <div class="form-row full">
                <div class="form-group">
                    <label>링크 주소 (URL) *</label>
                    <input type="url" id="f-url" placeholder="https://blog.naver.com/...">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>태그</label>
                    <input type="text" id="f-tag" placeholder="예: 첨단재생의료">
                </div>
                <div class="form-group">
                    <label>출처</label>
                    <input type="text" id="f-source" placeholder="예: 네이버 블로그">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>날짜</label>
                    <input type="text" id="f-date" placeholder="예: 2026.03.08">
                </div>
                <div class="form-group">
                    <label>썸네일 URL (선택)</label>
                    <input type="url" id="f-thumb" placeholder="이미지 주소 (없으면 기본 이미지)">
                </div>
            </div>
            <button class="btn-add" id="btnAdd" onclick="addArticle()">기사 추가하기</button>
        </div>

        <!-- 기사 목록 -->
        <div class="article-list">
            <div class="article-list-header">
                <h2>등록된 기사 <span class="article-count" id="countLabel"></span></h2>
            </div>
            <div id="articleList"><div class="loading-msg">불러오는 중...</div></div>
            <a href="news.html" target="_blank" class="preview-link">→ 기사 보기 페이지에서 확인</a>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
    const SUPABASE_URL = 'https://haxcktfnuudlqciyljtp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheGNrdGZudXVkbHFjaXlsanRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkzMDUwNDAsImV4cCI6MjA4NDg4MTA0MH0.suN7BeaHx3MjaNlMDQa0940P-rMl2XPyk4ksoQEU3YM';
    const PASSWORD = '9633';

    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function login() {
        const pw = document.getElementById('pwInput').value;
        if (pw === PASSWORD) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadArticles();
        } else {
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('pwInput').value = '';
            document.getElementById('pwInput').focus();
        }
    }

    function logout() {
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('pwInput').value = '';
        document.getElementById('loginError').style.display = 'none';
    }

    async function loadArticles() {
        const { data, error } = await _sb
            .from('news_articles')
            .select('*')
            .order('created_at', { ascending: false });
        if (error) { showToast('불러오기 실패: ' + error.message); return; }
        renderList(data || []);
    }

    async function addArticle() {
        const title  = document.getElementById('f-title').value.trim();
        const url    = document.getElementById('f-url').value.trim();
        const tag    = document.getElementById('f-tag').value.trim() || '블로그';
        const source = document.getElementById('f-source').value.trim() || '네이버 블로그';
        const date   = document.getElementById('f-date').value.trim() || '';
        const thumb  = document.getElementById('f-thumb').value.trim() || null;

        if (!title) { alert('기사 제목을 입력하세요.'); document.getElementById('f-title').focus(); return; }
        if (!url)   { alert('링크 주소를 입력하세요.'); document.getElementById('f-url').focus(); return; }

        const btn = document.getElementById('btnAdd');
        btn.disabled = true;
        btn.textContent = '저장 중...';

        const { error } = await _sb.from('news_articles').insert({ title, url, tag, source, date, thumb });

        btn.disabled = false;
        btn.textContent = '기사 추가하기';

        if (error) { showToast('저장 실패: ' + error.message); return; }

        ['f-title','f-url','f-tag','f-source','f-date','f-thumb'].forEach(id => {
            document.getElementById(id).value = '';
        });
        showToast('✅ 기사가 추가되었습니다!');
        loadArticles();
    }

    async function deleteArticle(id) {
        if (!confirm('이 기사를 삭제하시겠습니까?')) return;
        const { error } = await _sb.from('news_articles').delete().eq('id', id);
        if (error) { showToast('삭제 실패: ' + error.message); return; }
        showToast('🗑️ 삭제되었습니다.');
        loadArticles();
    }

    function renderList(articles) {
        const container = document.getElementById('articleList');
        document.getElementById('countLabel').textContent = '총 ' + articles.length + '개';

        if (articles.length === 0) {
            container.innerHTML = '<div class="empty-msg">등록된 기사가 없습니다.<br>위 폼에서 기사를 추가해 보세요.</div>';
            return;
        }

        container.innerHTML = articles.map(function(a, i) {
            return '<div class="article-item">' +
                '<div class="article-num">' + (i + 1) + '</div>' +
                '<div class="article-info">' +
                    '<span class="tag">' + esc(a.tag || '') + '</span>' +
                    '<div class="title" title="' + esc(a.title) + '">' + esc(a.title) + '</div>' +
                    '<div class="meta">' + esc(a.source || '') + ' · ' + esc(a.date || '') +
                    ' · <a href="' + esc(a.url) + '" target="_blank">링크 열기</a></div>' +
                '</div>' +
                '<button class="btn-delete" onclick="deleteArticle(' + a.id + ')">삭제</button>' +
            '</div>';
        }).join('');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</body>
</html>
